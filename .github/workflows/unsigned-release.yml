name: Unsigned Release

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Optional safety check; when set, must match VERSION on main"
        required: false
        type: string

permissions:
  contents: write

jobs:
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR branch policy
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          case "$BASE_REF" in
            develop)
              ;;
            main)
              if [[ "$HEAD_REF" != "develop" ]]; then
                echo "Release PRs to main must come from develop; got $HEAD_REF -> $BASE_REF" >&2
                exit 1
              fi

              git fetch --no-tags origin "$BASE_REF"
              if ! git diff --name-only "origin/$BASE_REF"...HEAD | grep -qx 'VERSION'; then
                echo "Release PRs to main must include VERSION" >&2
                exit 1
              fi
              ;;
            *)
              echo "PR base must be develop for implementation or main for release; got $BASE_REF" >&2
              exit 1
              ;;
          esac

      - name: Build and test Swift targets
        run: |
          swift build --product ScreenOCRApp
          swift test

      - name: Run layout smokes
        run: |
          bash scripts/run_hotkey_recorder_layout_smoke.sh
          bash scripts/run_settings_window_layout_smoke.sh
          bash scripts/run_permission_drop_panel_smoke.sh
          bash scripts/run_window_ordering_policy_smoke.sh

      - name: Run documentation and script checks
        run: |
          scripts/check_docs_links.sh
          scripts/check_documented_scripts.sh
          while IFS= read -r script; do
            bash -n "$script"
          done < <(find scripts -type f -name '*.sh' | sort)

  unsigned-release:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release
        id: release
        env:
          MANUAL_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          GIT_REF: ${{ github.ref }}
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < VERSION)"
          manual_version="${MANUAL_VERSION#v}"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$GIT_REF" != "refs/heads/main" ]]; then
              echo "Manual release rebuilds must run from main; got $GIT_REF" >&2
              exit 1
            fi

            if [[ -n "$MANUAL_VERSION" && "$manual_version" != "$version" ]]; then
              echo "Manual release version must match VERSION on main ($version); got $manual_version" >&2
              exit 1
            fi
          fi

          if [[ -z "$version" ]]; then
            echo "VERSION is empty" >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be stable semver x.y.z; got $version" >&2
            exit 1
          fi

          should_release=1
          if [[ "$EVENT_NAME" == "push" ]]; then
            if git rev-parse --verify "$BEFORE_SHA^{commit}" >/dev/null 2>&1; then
              if ! git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" | grep -qx 'VERSION'; then
                should_release=0
              fi
            fi
          fi

          {
            echo "version=$version"
            echo "release_tag=v$version"
            echo "should_release=$should_release"
          } >> "$GITHUB_OUTPUT"

      - name: Select framework Python
        if: steps.release.outputs.should_release == '1'
        run: |
          brew list python@3.12 >/dev/null 2>&1 || brew install python@3.12
          echo "SCREEN_OCR_PYTHON=$(brew --prefix python@3.12)/bin/python3.12" >> "$GITHUB_ENV"

      - name: Prepare OCR runtime
        if: steps.release.outputs.should_release == '1'
        run: scripts/setup_ocr_env.sh

      - name: Build unsigned embedded app bundle
        if: steps.release.outputs.should_release == '1'
        env:
          SCREEN_OCR_ENABLE_SPARKLE_UPDATES: ${{ vars.SCREEN_OCR_ENABLE_SPARKLE_UPDATES }}
          SCREEN_OCR_SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          version="${{ steps.release.outputs.version }}"
          SCREEN_OCR_VERSION="$version" SCREEN_OCR_EMBED_RUNTIME=1 SCREEN_OCR_CODESIGN_IDENTITY=- scripts/build_app_bundle.sh

      - name: Verify bundle
        if: steps.release.outputs.should_release == '1'
        run: |
          scripts/verify_app_bundle.sh
          scripts/verify_embedded_runtime_bundle.sh
          scripts/verify_app_signature.sh

      - name: Package unsigned app
        if: steps.release.outputs.should_release == '1'
        run: |
          set -euo pipefail
          release_tag="${{ steps.release.outputs.release_tag }}"
          arch="$(uname -m)"
          mkdir -p dist/release
          artifact="dist/release/Screen-OCR-${release_tag}-unsigned-macos-${arch}.zip"
          ditto -c -k --sequesterRsrc --keepParent "dist/Screen OCR.app" "$artifact"
          shasum -a 256 "$artifact" > "$artifact.sha256"
          cat > dist/release/UNSIGNED-README.txt <<README
          Screen OCR ${release_tag}

          This build is ad-hoc signed and not notarized. It does not use an
          Apple Developer account, Developer ID certificate, or Apple
          notarization service.

          macOS Gatekeeper will warn that the developer cannot be verified.
          Open it only if you trust this release source. Use Finder's Open
          flow or System Settings > Privacy & Security > Open Anyway.

          This artifact embeds the Python/PaddleOCR runtime and also keeps
          Apple Vision selectable on supported macOS versions.
          README

      - name: Generate Sparkle appcast
        if: steps.release.outputs.should_release == '1'
        env:
          SCREEN_OCR_ENABLE_SPARKLE_UPDATES: ${{ vars.SCREEN_OCR_ENABLE_SPARKLE_UPDATES }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          SCREEN_OCR_RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          SCREEN_OCR_RELEASE_DOWNLOAD_PREFIX: "https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.release_tag }}"
        run: |
          set -euo pipefail
          if [[ "${SCREEN_OCR_ENABLE_SPARKLE_UPDATES:-0}" != "1" ]]; then
            echo "Sparkle update experiment is disabled"
            exit 0
          fi
          scripts/generate_sparkle_appcast.sh

      - uses: actions/upload-artifact@v4
        if: steps.release.outputs.should_release == '1'
        with:
          name: screen-ocr-unsigned-${{ steps.release.outputs.release_tag }}
          path: |
            dist/release/*.zip
            dist/release/*.sha256
            dist/release/UNSIGNED-README.txt

      - name: Publish GitHub release
        if: steps.release.outputs.should_release == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_tag="${{ steps.release.outputs.release_tag }}"
          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release upload "$release_tag" dist/release/* --clobber
          else
            gh release create "$release_tag" dist/release/* \
              --target "$GITHUB_SHA" \
              --title "Screen OCR ${release_tag}" \
              --notes-file dist/release/UNSIGNED-README.txt
          fi

      - name: Commit Sparkle appcast
        if: steps.release.outputs.should_release == '1'
        env:
          SCREEN_OCR_ENABLE_SPARKLE_UPDATES: ${{ vars.SCREEN_OCR_ENABLE_SPARKLE_UPDATES }}
        run: |
          set -euo pipefail
          if [[ "${SCREEN_OCR_ENABLE_SPARKLE_UPDATES:-0}" != "1" ]]; then
            echo "Sparkle update experiment is disabled"
            exit 0
          fi

          release_tag="${{ steps.release.outputs.release_tag }}"
          if git diff --quiet -- docs/appcast.xml; then
            echo "No appcast changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit \
            -m "Make Sparkle clients see ${release_tag}" \
            -m "Constraint: Sparkle clients read the stable GitHub Pages appcast at https://inchan.github.io/screen-ocr/appcast.xml" \
            -m "Confidence: high" \
            -m "Scope-risk: narrow" \
            -m "Tested: scripts/generate_sparkle_appcast.sh generated docs/appcast.xml in the release job" \
            -m "Not-tested: GitHub Pages propagation timing is external to the release job" \
            -m "Co-authored-by: OmX <omx@oh-my-codex.dev>"
          git push
