<?xml version="1.0" encoding="UTF-8"?>
<!-- Screen OCR app icon — 심플 07: 뷰파인더 + 중심점 -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef0f3"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>
  <rect x="6" y="6" width="1012" height="1012" rx="224" ry="224" fill="none" stroke="#d7dbe0" stroke-width="6"/>

  <!-- Viewfinder brackets + center dot, scaled from the 64-unit source design -->
  <g fill="none" stroke="#1a1a1a" stroke-width="52" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 416 V256 H416"/>
    <path d="M768 416 V256 H608"/>
    <path d="M256 608 V768 H416"/>
    <path d="M768 608 V768 H608"/>
  </g>
  <circle cx="512" cy="512" r="62" fill="#c0392b"/>
</svg>
